set timeout=1
set default=0

insmod part_msdos
insmod chain
insmod play

# ---------------------------
# Auto-cycle forever: hd5 → hd4 → hd3 → hd2 → hd1 → hd0
# ---------------------------
menuentry "Auto Boot (loop hd5→hd0)" {
    set disks=(hd5 hd4 hd3 hd2 hd1 hd0)
    while true; do
        for disk in ${disks[@]}; do
            echo "Trying $disk..."
            # Optional beep for each attempt (440Hz, 0.1s)
            play 440 1 0.1
            set root=($disk)
            if [ -e ($disk) ]; then
                chainloader +1
            else
                echo "$disk not found, trying next..."
            fi
            sleep 1
        done
        echo "Finished cycle, restarting at hd5..."
    done
}

# ---------------------------
# Manual entries for each disk
# ---------------------------
menuentry "Boot hd5" { set root=(hd5); chainloader +1; }
menuentry "Boot hd4" { set root=(hd4); chainloader +1; }
menuentry "Boot hd3" { set root=(hd3); chainloader +1; }
menuentry "Boot hd2" { set root=(hd2); chainloader +1; }
menuentry "Boot hd1" { set root=(hd1); chainloader +1; }
menuentry "Boot hd0" { set root=(hd0); chainloader +1; }

# ---------------------------
# Manual fallback to GRUB CLI
# ---------------------------
menuentry "GRUB CLI" {
    echo "Entering GRUB command line..."
    sleep 3
    normal
}
